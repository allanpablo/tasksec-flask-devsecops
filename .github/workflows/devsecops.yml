name: DevSecOps Pipeline

on:
  push:
    branches: [ main, develop, homolog, staging ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with pytest
        run: |
          python -m pytest tests/ -v --cov=todo_project.todo_project --cov-report=term --cov-report=html:reports/coverage
          echo "COVERAGE_EXIT=0" >> $GITHUB_ENV

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: reports/coverage/

  bandit-sast:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install bandit
          pip install -r requirements.txt

      - name: Run Bandit SAST
        run: |
          mkdir -p reports
          bandit -r todo_project/todo_project/ -f html -o reports/bandit-report.html -c .bandit.yaml || true
          bandit -r todo_project/todo_project/ -c .bandit.yaml || true

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: reports/bandit-report.html

  dependency-check:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Run OWASP Dependency-Check
        continue-on-error: true
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "task-manager-flask"
          path: "."
          format: "HTML"
          out: "reports/dependency-check"

      - name: Upload Dependency-Check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports/dependency-check/
          if-no-files-found: warn

  pip-audit-sca:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit

      - name: Run pip-audit
        run: |
          mkdir -p reports/dependency-check
          python -m pip_audit -r requirements.txt --no-deps --disable-pip \
            -f json -o reports/dependency-check/pip-audit-report.json

      - name: Upload pip-audit report
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: reports/dependency-check/pip-audit-report.json

  docker-build:
    runs-on: ubuntu-latest
    needs: [bandit-sast, dependency-check, pip-audit-sca]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t task-manager-app:${{ github.sha }} .

      - name: Run container for ZAP testing
        run: |
          docker run -d --name task-manager-app -p 8080:8080 task-manager-app:${{ github.sha }}
          sleep 5
          curl -f http://localhost:8080/health || exit 1

      - name: Prepare ZAP report directory
        run: |
          mkdir -p reports
          cp .zap/rules.tsv reports/rules.tsv
          chmod 777 reports

      - name: Run OWASP ZAP DAST
        run: |
          docker run --rm --network host -v "$PWD/reports:/zap/wrk" \
            zaproxy/zap-stable:latest \
            zap-baseline.py -t http://127.0.0.1:8080 \
            -c rules.tsv \
            -J zap-report.json \
            -w zap-report.md

      - name: Stop container
        if: always()
        run: docker stop task-manager-app

      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: reports/zap-report.*

  deploy-stage:
    if: github.ref == 'refs/heads/homolog' || github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: docker-build
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to stage
        run: |
          echo "Deploy em stage (simulado)"
          docker compose -f docker-compose.yml up -d --build

  deploy-prod:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: deploy-stage
    environment: production
    steps:
      - name: Deploy to production (manual)
        run: |
          echo "Deploy em produção — aprovação manual necessária"
