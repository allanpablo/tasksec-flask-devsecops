services:
  app:
    build: .
    container_name: tasksec-app
    ports:
      - "8080:8080"
    environment:
      - SECRET_KEY=${SECRET_KEY:-changeme-in-production}
      - DATABASE_URL=sqlite:////app/data/tasks.db
      - FLASK_INSTANCE_PATH=/app/data/instance
      - SYSLOG_HOST=syslog
      - SYSLOG_PORT=514
    volumes:
      - app_data:/app/data
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    depends_on:
      syslog:
        condition: service_started
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  syslog:
    image: balabit/syslog-ng:latest
    container_name: tasksec-syslog
    ports:
      - "514:514/udp"
      - "601:601/tcp"
    volumes:
      - syslog_data:/var/log
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
      - /var/lib/syslog-ng
    security_opt:
      - no-new-privileges:true

volumes:
  app_data:
  syslog_data:
