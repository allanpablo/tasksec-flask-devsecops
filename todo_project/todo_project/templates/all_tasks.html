{% extends "layout.html" %}

{% block content %}

{% if tasks %}
<table class="table table-bordered">
    <thead>
        <tr class="text-center">
            <th scope="col">#</th>
            <th scope="col" class="task-col">Task</th>
            <th scope="col" class="action-col">Update</th>
            <th scope="col" class="action-col">Delete</th>
        </tr>
    </thead>
    <tbody>
        {% for task in tasks %}
        <tr>
            <th scope="row" class="text-center">{{ loop.index }}</th>
            <td>{{ task.content }}</td>
            <td class="text-center">
                <a href="{{ url_for('update_task', task_id=task.id) }}" class="btn btn-outline-secondary btn-sm">Update</a>
            </td>
            
            <td class="text-center">
                <a href="{{ url_for('delete_task', task_id=task.id) }}" class="btn btn-outline-danger btn-sm">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% else %}
<legend>No Tasks to Display</legend>
<p class="text-muted">
    Click <a href="{{ url_for('add_task') }}">here</a> to Add Task
</p>
{% endif %}

{% endblock %}
