stages:
  - test
  - sast
  - dependency-check
  - docker-build
  - dast
  - deploy-stage
  - deploy-prod

variables:
  DOCKER_IMAGE: registry.gitlab.com/$CI_PROJECT_PATH
  DOCKER_TLS_CERTDIR: ""
  DOCKER_HOST: tcp://docker:2375

default:
  image: python:3.12-slim

before_script:
  - apt-get update && apt-get install -y --no-install-recommends gcc curl
  - pip install --no-cache-dir -r requirements.txt

test:
  stage: test
  script:
    - pytest tests/ -v --cov=app --cov-report=term --cov-report=html:reports/coverage
  artifacts:
    paths:
      - reports/coverage/
    expire_in: 30 days

bandit-sast:
  stage: sast
  script:
    - pip install bandit
    - mkdir -p reports
    - bandit -r app/ -f html -o reports/bandit-report.html -c .bandit.yaml || true
    - bandit -r app/ -c .bandit.yaml || true
  artifacts:
    paths:
      - reports/bandit-report.html
    expire_in: 30 days

dependency-check:
  stage: dependency-check
  image:
    name: owasp/dependency-check:latest
    entrypoint: [""]
  before_script: []
  allow_failure: true
  script:
    - mkdir -p reports/dependency-check
    - /usr/share/dependency-check/bin/dependency-check.sh
      --project "tasksec"
      --scan .
      --format HTML
      --out reports/dependency-check
  artifacts:
    when: always
    paths:
      - reports/dependency-check/
    expire_in: 30 days

pip-audit-sca:
  stage: dependency-check
  script:
    - pip install pip-audit
    - mkdir -p reports/dependency-check
    - python -m pip_audit -r requirements.txt --no-deps --disable-pip -f json -o reports/dependency-check/pip-audit-report.json
  artifacts:
    paths:
      - reports/dependency-check/pip-audit-report.json
    expire_in: 30 days

docker-build:
  stage: docker-build
  image: docker:latest
  services:
    - docker:dind
  before_script: []
  script:
    - docker build -t $DOCKER_IMAGE:$CI_COMMIT_SHA .
    - docker run -d --name tasksec-app -p 8080:8080 $DOCKER_IMAGE:$CI_COMMIT_SHA
    - sleep 5
    - wget -qO- http://localhost:8080/health
  artifacts:
    expire_in: 30 days

zap-dast:
  stage: dast
  image: docker:latest
  services:
    - docker:dind
  before_script: []
  script:
    - mkdir -p reports
    - docker network create tasksec-ci
    - docker build -t tasksec-app:$CI_COMMIT_SHA .
    - docker run -d --name tasksec-app --network tasksec-ci tasksec-app:$CI_COMMIT_SHA
    - sleep 8
    - docker run --rm --network tasksec-ci -v "$PWD/reports:/zap/wrk" zaproxy/zap-stable:latest zap-baseline.py -t http://tasksec-app:8080 -J zap-report.json -w zap-report.md || true
  artifacts:
    paths:
      - reports/zap-report.json
      - reports/zap-report.md
    expire_in: 30 days

deploy-stage:
  stage: deploy-stage
  before_script: []
  script:
    - echo "Deploy em stage (simulado)"
  environment: staging
  only:
    - staging
    - main

deploy-prod:
  stage: deploy-prod
  before_script: []
  script:
    - echo "Deploy em producao — requer aprovacao manual"
  environment: production
  when: manual
  only:
    - main
